<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tinker Tides</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<script src="icon-data.js"></script>
<script>
  // Inject mask-image rules for cabinet-side gold piles and the mural backdrop.
  // Inline-injected stylesheet (instead of CSS vars) avoids quirks with var()
  // resolution inside mask-image and runs as soon as icon-data.js parses.
  (function injectDecorativeMasks(){
    const coin  = `url("data:image/svg+xml,${ICON_DATA['coins']}")`;
    const mural = `url("data:image/svg+xml,${ICON_DATA['crossed-swords']}")`;
    const css = `
      .cabinet-pile::after{
        -webkit-mask-image:${coin};mask-image:${coin};
      }
      body::after{
        -webkit-mask-image:${mural};mask-image:${mural};
      }
    `;
    const s = document.createElement('style');
    s.textContent = css;
    document.head.appendChild(s);
  })();

  // Responsive panel relocation:
  //   - Wide (>=900px): progressives → RIGHT cabinet TOP, win panel → LEFT cabinet BOTTOM
  //   - Narrow (<900px): both panels return to top of .game-wrap (progressives, then win)
  document.addEventListener('DOMContentLoaded', () => {
    const progressives  = document.getElementById('progressivesPanel');
    const winPanel      = document.getElementById('winPanel');
    const cabinetContent = document.querySelector('.cabinet-content');
    const leftSlot      = document.getElementById('cabinetSlotLeft');
    const rightSlot     = document.getElementById('cabinetSlotRight');
    if (!progressives || !winPanel || !cabinetContent || !leftSlot || !rightSlot) return;

    const mq = window.matchMedia('(min-width: 900px)');
    function relocate(){
      if (mq.matches) {
        leftSlot.appendChild(winPanel);
        rightSlot.appendChild(progressives);
      } else {
        // Restore to top of .cabinet-content, in mobile DOM order: progressives first, then win
        cabinetContent.prepend(winPanel);
        cabinetContent.prepend(progressives);
      }
    }
    relocate();
    mq.addEventListener('change', relocate);
  });
</script>
<style>
:root{
  --bg:#0d0d1a;
  --bg-card:#161628;
  --bg-hover:#1e1e3a;
  --bg-input:#1a1a30;
  --text:#E0E8FF;
  --text-muted:#8890a8;
  --accent:#39ff14;
  --gold:#ffd35c;
  --gold-bright:#ffd700;
  --gold-dim:#8b6914;
  --red:#ff4444;
  --border:rgba(255,255,255,.08);
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Courier New',monospace;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
}
/* Header */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#0d0d1a 80%,transparent);
  padding:8px 12px;display:flex;align-items:center;justify-content:center;
  height:64px;
}
.header h1{
  font-family:'Impact','Arial Black',sans-serif;
  font-size:42px;
  font-weight:900;
  color:var(--gold-bright);
  letter-spacing:6px;
  text-shadow:2px 2px 0 #000,0 0 14px rgba(255,215,0,.55);
  -webkit-text-stroke:1.5px #1a0a02;
  paint-order:stroke fill;
  line-height:1;
  transform:scaleY(1.15);
  transform-origin:center top;
}
@media(max-width:560px){
  .header{height:48px}
  .header h1{font-size:28px;letter-spacing:4px}
}

/* Main container — center column inside the cabinet-frame grid. The wooden
   cabinet (.cabinet-content) sits at the top; the cabinet sides on wider
   screens stretch to match this column's height, so making the cabinet end
   at the SPIN button (i.e. NOT putting more stuff after it) is what aligns
   the side-panel bottoms with the SPIN button. Bill / footer / debug live
   OUTSIDE this — in .below-cabinet, sibling of .cabinet-frame. */
.game-wrap{
  width:100%;max-width:660px;padding:72px 8px 0;
  display:flex;flex-direction:column;align-items:center;gap:0;
  z-index:1;
}
@media(max-width:560px){
  .game-wrap{padding-top:56px}
}

/* Wooden ship-cabinet frame — wraps the play area (progressives → SPIN). */
.cabinet-content{
  position:relative;
  width:100%;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:26px 22px;
  border:6px solid #2a1608;
  border-radius:12px;
  /* Wood-grain background: layered repeating gradients + radial wood tint */
  background:
    repeating-linear-gradient(0deg,
      rgba(0,0,0,.10) 0,rgba(0,0,0,.10) 1px,
      transparent 1px,transparent 7px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,
      transparent 1px,transparent 23px),
    radial-gradient(ellipse at 50% 30%, #6b3f1c 0%, #4a2914 60%, #2c1709 100%);
  box-shadow:
    inset 0 0 28px rgba(0,0,0,.7),
    inset 0 0 0 2px rgba(212,164,74,.55),
    0 6px 22px rgba(0,0,0,.55);
}
/* Four brass rivets in a single pseudo-element via four layered radial
   gradients (one per corner). The off-center gradient origin gives each
   rivet a highlight on the upper-left quadrant. */
.cabinet-content::before{
  content:'';
  position:absolute;inset:0;
  pointer-events:none;
  z-index:5;
  background:
    /* top-left */
    radial-gradient(circle 7px at 11px 11px,
      #fff5d0 0%, #e8c97a 32%, #a87420 70%, #3a2008 92%, transparent 95%) no-repeat,
    /* top-right */
    radial-gradient(circle 7px at calc(100% - 11px) 11px,
      #fff5d0 0%, #e8c97a 32%, #a87420 70%, #3a2008 92%, transparent 95%) no-repeat,
    /* bottom-left */
    radial-gradient(circle 7px at 11px calc(100% - 11px),
      #fff5d0 0%, #e8c97a 32%, #a87420 70%, #3a2008 92%, transparent 95%) no-repeat,
    /* bottom-right */
    radial-gradient(circle 7px at calc(100% - 11px) calc(100% - 11px),
      #fff5d0 0%, #e8c97a 32%, #a87420 70%, #3a2008 92%, transparent 95%) no-repeat;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.7));
}

/* Below-cabinet zone: bill inserter, footer tabs, debug panel — sits under
   the cabinet, centered to the same width as the cabinet column. */
.below-cabinet{
  width:100%;max-width:600px;
  margin:8px auto 0;
  padding:0 8px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:1;
}

/* === Atmospheric backdrop (shading + faded mural silhouette) === */
body::before{
  /* shading gradient — deep navy with subtle top highlight */
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at top,rgba(50,80,120,.25) 0%,transparent 60%),
    linear-gradient(180deg,#0a1822 0%,#050a10 100%);
}
body::after{
  /* faded crossed-swords mural centered behind the game (mask URL injected from icon-data.js) */
  content:'';
  position:fixed;
  top:60px;left:0;right:0;bottom:60px;
  z-index:0;pointer-events:none;
  background-color:rgba(212,160,23,.11);
  -webkit-mask-position:center;mask-position:center;
  -webkit-mask-size:85% auto;mask-size:85% auto;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
}
.cabinet-frame{position:relative;z-index:1}

/* Cabinet frame — adds decorative side panels around the game on wider screens.
   On mobile, only the middle column exists; sides are added at >=900px. */
.cabinet-frame{
  width:100%;
  display:grid;
  grid-template-columns:minmax(0,600px);
  justify-content:center;
  align-items:stretch;
  position:relative;
}
@media(min-width:900px){
  .cabinet-frame{
    grid-template-columns:1fr minmax(0,600px) 1fr;
  }
}
.cabinet-side{
  position:relative;
  min-height:100%;
  display:none; /* shown via media query on wider screens */
  flex-direction:column;
  align-items:center;
  /* padding-bottom matches .cabinet-content's padding-bottom (26px) so the
     loyalty card / coin pile bottom aligns with the SPIN button bottom. */
  padding:72px 4% 26px;
  gap:12px;
}
.cabinet-side-content{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:6px;
}
.cabinet-side-content:empty{display:none}
.cabinet-pile{
  /* fixed-aspect inner wrapper so glow and icon scale together */
  position:relative;
  pointer-events:none;
  width:100%;
  max-width:200px;
  aspect-ratio:1;
}
/* LEFT side: gold pile TOP, content panel BOTTOM */
.cabinet-side-left .cabinet-side-content{margin-top:auto}
/* RIGHT side: content panel TOP, gold pile BOTTOM */
.cabinet-side-right .cabinet-pile{margin-top:auto}
.cabinet-pile::before{
  /* warm radial glow centered on the coin mass */
  content:'';
  position:absolute;
  inset:-20%;          /* extend beyond the pile in all directions */
  background:radial-gradient(circle at center,
    rgba(255,210,80,.7) 0%,
    rgba(255,180,30,.35) 22%,
    rgba(255,150,20,.12) 48%,
    transparent 72%);
  filter:blur(18px);
  z-index:0;
}
.cabinet-pile::after{
  /* the gold coin stacks icon — mask URL injected from icon-data.js */
  content:'';
  position:absolute;inset:0;
  background-color:#ffcf3a;
  -webkit-mask-position:center bottom;
  mask-position:center bottom;
  -webkit-mask-size:contain;
  mask-size:contain;
  -webkit-mask-repeat:no-repeat;
  mask-repeat:no-repeat;
  z-index:1;
  filter:
    drop-shadow(0 0 8px rgba(255,200,60,.5))
    drop-shadow(2px 2px 0 rgba(120,70,0,.5));
}
.cabinet-side-right .cabinet-pile::after{
  transform:scaleX(-1);
}
@media(min-width:900px){
  .cabinet-side{display:flex}
}

/* === Progressives panel === */
.progressives-panel{
  width:100%;max-width:340px;
  display:flex;flex-direction:column;gap:5px;
  border:2px solid var(--gold-dim);
  border-radius:var(--radius);
  padding:8px;
  background:linear-gradient(180deg,#1a0d04 0%,#0a0502 100%);
  box-shadow:inset 0 0 12px rgba(0,0,0,.6);
}
.progressives-title{
  text-align:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-size:14px;letter-spacing:3px;
  color:var(--gold-bright);
  -webkit-text-stroke:.5px #000;
  paint-order:stroke fill;
  margin-bottom:2px;
}
.jackpot-ticker{
  text-align:center;padding:6px 8px;border-radius:6px;
  font-weight:bold;
  border:2px solid var(--border);
  background:linear-gradient(180deg,#15151f,#0a0a12);
  box-shadow:inset 0 1px 4px rgba(0,0,0,.6);
}
.jackpot-ticker .jp-label{
  font-size:10px;text-transform:uppercase;
  display:block;margin-bottom:2px;letter-spacing:2px;
}
.jackpot-ticker .jp-value{
  font-size:18px;font-family:'Courier New',monospace;letter-spacing:1px;
}
.progressives-panel .jackpot-ticker.grand{border-color:#ffd700}
.progressives-panel .jackpot-ticker.grand .jp-label{color:#ffd700}
.progressives-panel .jackpot-ticker.grand .jp-value{font-size:24px;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.5)}
.progressives-panel .jackpot-ticker.major{border-color:#c0c0c0}
.progressives-panel .jackpot-ticker.major .jp-label{color:#c0c0c0}
.progressives-panel .jackpot-ticker.major .jp-value{font-size:18px;color:#c0c0c0;text-shadow:0 0 6px rgba(192,192,192,.4)}
.progressives-panel .jackpot-ticker.mini{border-color:#cd7f32}
.progressives-panel .jackpot-ticker.mini .jp-label{color:#cd7f32}
.progressives-panel .jackpot-ticker.mini .jp-value{font-size:14px;color:#cd7f32;text-shadow:0 0 4px rgba(205,127,50,.4)}

/* === Win / Cash / Bet / Denom panel === */
.win-panel{
  width:100%;max-width:340px;
  display:flex;flex-direction:column;gap:5px;
}
.win-line-callout{
  /* Per-line tally text shown above the WIN box during the showcase phase */
  text-align:center;
  font-size:11px;font-weight:bold;
  color:var(--gold-bright);
  letter-spacing:1px;
  text-shadow:0 0 6px rgba(255,215,0,.55);
  height:16px;line-height:16px;
  opacity:0;
  transition:opacity .15s ease;
}
.win-line-callout.visible{opacity:1}

.win-led-box{
  background:#0a0a12;
  border:2px solid #2a2a3a;
  border-radius:var(--radius);
  padding:8px 12px;text-align:center;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.5);
}
.win-led-label{
  display:block;font-size:9px;text-transform:uppercase;
  letter-spacing:2px;color:var(--text-muted);
}
.win-led-value{
  display:block;font-size:32px;font-weight:bold;
  letter-spacing:2px;color:var(--gold);
  text-shadow:0 0 8px rgba(255,211,92,.5),0 0 16px rgba(255,211,92,.2);
  font-family:'Courier New',monospace;
  min-height:36px;line-height:1;margin-top:2px;
}
.win-led-value.win-flash{
  animation:winFlash 0.8s ease infinite alternate;
}
.win-row{display:flex;gap:5px;align-items:stretch}
.win-row-box{
  flex:1;min-width:0;
  background:#0a0a12;
  border:2px solid #2a2a3a;
  border-radius:var(--radius);
  padding:5px 6px;text-align:center;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.5);
}
/* Field width allotment:
     Cash → wide enough for "$99,999.99" (10 chars in Courier at 16px)
     Bet  → narrow (max value is 500, only 3 chars)
     Denom → fixed-square clickable button */
.win-row-cash{flex:5}
.win-row-bet{flex:2}
.win-row-box.clickable{
  cursor:pointer;
  transition:filter .15s,background .15s,transform .1s;
}
.win-row-box.clickable:hover{filter:brightness(1.2)}
.win-row-box.clickable:active{transform:translateY(1px)}
.win-row-label{
  display:block;font-size:8px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-muted);margin-bottom:2px;
}
.win-row-value{
  display:block;font-size:16px;font-weight:bold;
  color:#ff3333;letter-spacing:1px;
  text-shadow:0 0 6px rgba(255,51,51,.4);
  font-family:'Courier New',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#cashDisplay,#denomDisplay{
  color:var(--gold);
  text-shadow:0 0 6px rgba(255,211,92,.4);
}

/* Denom button — fixed square, lighter raised look so it reads as clickable.
   Its caption ("Change") sits below the denom value to make the action obvious. */
.denom-btn{
  flex:0 0 56px;
  aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;
  background:linear-gradient(180deg,#2c2c44 0%,#181822 100%);
  border-color:#5a5a72;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -3px 5px rgba(0,0,0,.45),
    0 2px 4px rgba(0,0,0,.55);
}
.denom-btn:hover{
  background:linear-gradient(180deg,#3a3a55 0%,#22222e 100%);
}
.denom-btn:active{
  background:linear-gradient(180deg,#181822 0%,#2c2c44 100%);
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,.55),
    0 0 0 rgba(0,0,0,0);
}
.denom-btn .win-row-value{
  font-size:14px;
}
.denom-change{
  display:block;font-size:8px;text-transform:uppercase;
  letter-spacing:1px;color:var(--gold);
  margin-top:1px;line-height:1;
  opacity:.85;
}
.loyalty-card-mini{
  display:flex;align-items:center;gap:6px;font-size:11px;
  padding:4px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg-card);
  justify-content:center;
}
.loyalty-card-mini .tier-dot{
  width:8px;height:8px;border-radius:50%;
}
.loyalty-card-mini .tier-label{font-weight:bold}
.loyalty-card-mini .player-id{color:var(--text-muted);font-size:10px;letter-spacing:.5px}

/* === Reel area: line indicator + reel frame === */
.reel-area{
  width:100%;
  display:flex;align-items:stretch;gap:6px;
}
.line-indicator{
  flex:0 0 28px;
  display:flex;flex-direction:column;
}
.line-stripe-list{
  flex:1;
  display:flex;flex-direction:column;
  border:2px solid var(--gold-dim);
  border-radius:4px;
  overflow:hidden;
  padding:2px;
  background:#0a0a12;
}
/* Each section = 1/3 of the bar, aligning with one row of the leftmost reel */
.line-section{
  flex:1;
  display:flex;flex-direction:column;gap:1px;
  padding:1px 0;
}
.line-section + .line-section{
  border-top:1px solid rgba(255,215,0,.18);
}
.line-stripe{
  flex:1;
  border-radius:1px;
  min-height:2px;
  transition:filter .25s,box-shadow .25s,transform .25s;
  opacity:.55;
}
.line-stripe.active{
  opacity:1;
  filter:brightness(1.4) saturate(1.3);
  box-shadow:0 0 10px currentColor,inset 0 0 4px rgba(255,255,255,.6);
  animation:lineStripePulse .5s ease infinite alternate;
}
@keyframes lineStripePulse{
  from{opacity:.85;transform:scaleX(1)}
  to{opacity:1;transform:scaleX(1.15)}
}

/* Row beneath the reels: "20 LINES" label, then the controls cluster
   (INSERT $100 | SPIN circle | CASH OUT). The SPIN button is a large
   circle taking ~half the controls width; Insert and Cash Out are smaller
   side buttons that share the remaining space. */
.below-reels-row{
  width:100%;
  display:flex;align-items:center;gap:8px;
}
.line-indicator-label{
  flex:0 0 28px;
  align-self:flex-start;
  text-align:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-size:10px;line-height:1.05;
  color:var(--gold);
  letter-spacing:1px;
  padding:4px 0 0;
}
.line-indicator-label span{
  display:block;font-size:14px;color:var(--gold-bright);
}
.below-reels-row .controls{
  flex:1;
  display:flex;align-items:stretch;justify-content:center;
  gap:10px;
}
/* The controls cluster has TWO COLUMNS at this level:
   1. .controls-stack (flex:1)  — two stacked rows of small buttons
      Row 1: [INSERT $][CASH OUT □]    (Cash Out is a square)
      Row 2: [Paytable][Stats][Settings]
   2. .btn-spin (auto width)    — large circle, double-height (matches stack) */
.controls-stack{
  flex:1;
  display:flex;flex-direction:column;gap:6px;
  min-width:0;
}
.controls-row{
  flex:1 1 0;
  display:flex;gap:6px;align-items:stretch;
  min-height:0;
}
@media(max-width:380px){
  .line-indicator,.line-indicator-label{flex:0 0 20px}
  .line-indicator-label{font-size:8px}
  .line-indicator-label span{font-size:11px}
}

/* Reel grid */
.reel-frame{
  position:relative;width:100%;aspect-ratio:5/3;
  background:var(--bg-card);border-radius:var(--radius);
  border:2px solid var(--border);overflow:hidden;
}
.reel-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  width:100%;height:100%;gap:0;padding:0;
}
.reel-col{
  position:relative;overflow:hidden;
}
.reel-strip{
  display:flex;flex-direction:column;
}
.symbol-cell{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  border-radius:0;
  border:3px solid #d4a44a;
  outline:1px solid #5c3a1a;
  flex-shrink:0;
}
.symbol-cell::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,transparent 30%,rgba(0,0,0,.45) 100%);
  pointer-events:none;
  z-index:0;
}
.symbol-cell .sym-icon{
  width:70%;height:70%;
  -webkit-mask-size:contain;mask-size:contain;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:center;mask-position:center;
  background:radial-gradient(circle,#fff,#ddd);
  position:relative;z-index:1;
}

/* === Per-symbol special treatments === */

/* WILD — dark bg + pulsing yellow halo + WILD watermark + glowing coins */
.symbol-cell.sym-wild{
  background:#1a1208 !important;
}
.symbol-cell.sym-wild::after{
  content:'WILD';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-size:2.4em;font-weight:900;
  letter-spacing:-0.04em;
  color:rgba(255,200,0,.32);
  text-shadow:0 0 8px rgba(255,180,0,.4);
  transform:scaleY(1.5);
  pointer-events:none;z-index:2;
  line-height:1;
  overflow:hidden;
}
.symbol-cell.sym-wild .sym-icon{
  width:55% !important;height:55% !important;
  background:radial-gradient(circle,#fff5a0,#ffd700 40%,#ff9500) !important;
  filter:drop-shadow(0 0 10px rgba(255,215,0,1))
         drop-shadow(0 0 20px rgba(255,200,0,.9));
  animation:coinPulse 1.2s ease infinite alternate;
  z-index:3;
}
@keyframes coinPulse{
  from{
    filter:drop-shadow(0 0 8px rgba(255,215,0,.8))
           drop-shadow(0 0 16px rgba(255,200,0,.6));
    transform:scale(1);
  }
  to{
    filter:drop-shadow(0 0 16px rgba(255,235,100,1))
           drop-shadow(0 0 36px rgba(255,200,0,1));
    transform:scale(1.12);
  }
}

/* SCATTER (treasure map) — leather bg + FREE / SPIN watermark labels + map icon */
.symbol-cell.sym-scatter{
  background:
    repeating-linear-gradient(0deg,
      rgba(0,0,0,.12) 0,rgba(0,0,0,.12) 1px,
      transparent 1px,transparent 6px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.08) 0,rgba(0,0,0,.08) 1px,
      transparent 1px,transparent 11px),
    radial-gradient(ellipse at 50% 50%, rgba(255,220,140,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 35% 30%, #5c3a1a 0%, #3d2410 60%, #1f1208 100%) !important;
  box-shadow:inset 0 0 16px rgba(0,0,0,.6);
}
/* Override the universal vignette ::before with the "FREE" watermark.
   Stretched horizontally to nearly the cell width and faded so the map icon
   reads as foreground. */
.symbol-cell.sym-scatter::before{
  content:'FREE';
  background:none;
  position:absolute;
  top:2%;left:0;right:0;
  text-align:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-weight:900;
  font-size:1.6em;
  letter-spacing:-0.02em;
  color:rgba(255,200,0,.18);
  text-shadow:0 0 6px rgba(255,180,0,.18);
  transform:scale(1.65,1.25);
  transform-origin:top center;
  line-height:1;
  pointer-events:none;
  z-index:0;
}
.symbol-cell.sym-scatter::after{
  content:'SPIN';
  position:absolute;
  bottom:2%;left:0;right:0;
  text-align:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-weight:900;
  font-size:1.6em;
  letter-spacing:-0.02em;
  color:rgba(255,200,0,.18);
  text-shadow:0 0 6px rgba(255,180,0,.18);
  transform:scale(1.65,1.25);
  transform-origin:bottom center;
  line-height:1;
  pointer-events:none;
  z-index:0;
  /* clear any inherited circle/animation styles */
  background:none;
  width:auto;height:auto;
  border-radius:0;
  animation:none;
}
.symbol-cell.sym-scatter .sym-icon{
  width:50% !important;height:50% !important;
  background:radial-gradient(circle,#f5e3b5,#d4b683 70%,#b89260) !important;
  filter:drop-shadow(0 0 10px rgba(255,200,140,.6))
         drop-shadow(0 0 22px rgba(255,180,80,.4));
  animation:scatterIconPulse 2.2s ease-in-out infinite alternate;
  z-index:1;
}
@keyframes scatterIconPulse{
  from{filter:drop-shadow(0 0 8px rgba(255,200,140,.4)) drop-shadow(0 0 16px rgba(255,180,80,.3))}
  to  {filter:drop-shadow(0 0 18px rgba(255,200,140,.85)) drop-shadow(0 0 32px rgba(255,180,80,.65))}
}

/* CHEST — bright gold bg + dark brown icon */
.symbol-cell.sym-chest{
  background:#daa520 !important;
}
.symbol-cell.sym-chest .sym-icon{
  background:radial-gradient(circle,#1f0d02,#0a0500) !important;
  filter:drop-shadow(0 1px 1px rgba(255,255,255,.25));
}

/* SKULL & CAPTAIN — constant silver halo */
.symbol-cell.sym-skull,
.symbol-cell.sym-captain{
  background:#263238 !important;
}
.symbol-cell.sym-skull::after,
.symbol-cell.sym-captain::after{
  content:'';position:absolute;
  top:50%;left:50%;
  width:95%;height:95%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at center,
    rgba(240,248,255,.6) 0%,
    rgba(200,220,255,.3) 30%,
    rgba(180,200,255,.12) 55%,
    transparent 75%);
  pointer-events:none;
  z-index:0;
  border-radius:50%;
}

/* BONUS (ship-wheel) — wood textured bg + small spinning wheel + BONUS text */
.symbol-cell.sym-bonus{
  background:
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.10) 0,rgba(0,0,0,.10) 1px,
      transparent 1px,transparent 4px),
    repeating-linear-gradient(0deg,
      rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,
      transparent 1px,transparent 9px),
    radial-gradient(ellipse at 30% 40%, #a06438 0%, #7d4a26 50%, #4a2e15 100%) !important;
  box-shadow:inset 0 0 12px rgba(0,0,0,.5);
  flex-direction:column;
  justify-content:flex-start;
  padding-top:4%;
}
.symbol-cell.sym-bonus .sym-icon{
  width:64% !important;height:64% !important;
  background:radial-gradient(circle,#fff8dc,#daa520) !important;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));
  animation:bonusWheelSpin 7s ease-in-out infinite;
  transform-origin:center;
  z-index:1;
}
.symbol-cell.sym-bonus::after{
  content:'BONUS';
  position:absolute;
  left:4%;right:4%;bottom:4%;
  text-align:center;
  font-family:'Impact','Arial Black',sans-serif;
  font-weight:900;
  font-size:1.25em;
  letter-spacing:0.04em;
  color:#daa520;
  -webkit-text-stroke:1.5px #000;
  paint-order:stroke fill;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
  transform:scaleX(1.2);
  line-height:1;
  pointer-events:none;
  z-index:2;
}
@keyframes bonusWheelSpin{
  0%   {transform:rotate(0deg)}
  35%  {transform:rotate(-360deg)}
  50%  {transform:rotate(-360deg)}
  85%  {transform:rotate(0deg)}
  100% {transform:rotate(0deg)}
}

/* Win highlight */
.symbol-cell.win-highlight{
  animation:winPulse 0.6s ease infinite alternate;
}
@keyframes winPulse{
  from{box-shadow:inset 0 0 8px rgba(255,215,0,.5),0 0 12px rgba(255,215,0,.3)}
  to{box-shadow:inset 0 0 16px rgba(255,215,0,.8),0 0 24px rgba(255,215,0,.6)}
}
/* Bonus-trigger glow (ship wheels that triggered the wheel-of-fortune) */
.symbol-cell.bonus-trigger-glow{
  animation:bonusGlow 0.5s ease infinite alternate;
  z-index:3;
}
@keyframes bonusGlow{
  from{box-shadow:inset 0 0 10px rgba(77,208,225,.6),0 0 16px rgba(77,208,225,.5)}
  to  {box-shadow:inset 0 0 22px rgba(77,208,225,.95),0 0 36px rgba(77,208,225,.85)}
}
/* Payline overlay */
.payline-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:10;
}
.payline-overlay svg{width:100%;height:100%}

/* Win display (kept for notification text) */
.win-display{
  width:100%;text-align:center;padding:2px;
  font-size:14px;font-weight:bold;min-height:20px;
  color:var(--gold);
}
.win-display.big-win{
  animation:bigWinPulse 0.5s ease infinite alternate;
  font-size:18px;
}
@keyframes bigWinPulse{
  from{text-shadow:0 0 8px var(--gold)}
  to{text-shadow:0 0 24px var(--gold),0 0 48px rgba(255,211,92,.5)}
}

/* Controls */
.controls{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:4px 0;
}
/* SPIN button — large brass-rimmed CIRCLE in the middle of the controls
   cluster. Diameter scales with viewport but caps at 130px on wide screens. */
.btn-spin{
  flex:0 0 auto;
  width:clamp(96px, 30vw, 130px);
  aspect-ratio:1;
  border:3px solid #2a1608;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%,#7eff5a 0%,#39ff14 35%,#22cc00 75%,#0e8400 100%);
  color:#0a2400;
  font-family:'Impact','Arial Black',sans-serif;
  font-size:24px;font-weight:900;letter-spacing:2px;
  cursor:pointer;
  box-shadow:
    inset 0 -4px 8px rgba(0,0,0,.4),
    inset 0 3px 6px rgba(255,255,255,.4),
    inset 0 0 0 2px rgba(212,164,74,.7),
    0 4px 10px rgba(0,0,0,.5);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  text-shadow:0 1px 1px rgba(255,255,255,.3);
  line-height:1;
}
.btn-spin:hover{filter:brightness(1.15);transform:scale(1.03)}
.btn-spin:active{transform:scale(0.96)}
.btn-spin:disabled{
  background:radial-gradient(circle at 35% 30%,#3a3a4a,#1a1a25);
  color:var(--text-muted);
  cursor:not-allowed;filter:none;transform:none;
}
.btn-spin.free-spin-btn{
  background:radial-gradient(circle at 35% 30%,#d4a3ff 0%,#a855f7 35%,#7c3aed 75%,#4c1d95 100%);
  color:#fff;
  font-size:13px;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
}

/* Side buttons — common brass-trimmed look used by Insert, Cash Out, and the
   Paytable / Stats / Settings tabs. Each variant overrides background + size. */
.btn-side{
  flex:1 1 0;
  height:100%;
  min-height:0;
  border:2px solid #2a1608;
  border-radius:8px;
  cursor:pointer;
  font-family:'Impact','Arial Black',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:1px;
  line-height:1.05;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  position:relative;
  box-shadow:
    inset 0 -2px 4px rgba(0,0,0,.35),
    inset 0 2px 3px rgba(255,255,255,.3),
    inset 0 0 0 2px rgba(212,164,74,.5),
    0 2px 6px rgba(0,0,0,.45);
  transition:all .15s;
  padding:4px 6px;
}
.btn-side:hover{filter:brightness(1.15);transform:scale(1.03)}
.btn-side:active{transform:scale(0.96)}

/* Insert $ — green, with a horizontal bill-slot slit at the top so it reads
   as a "cash inserter" instead of a generic button. */
.btn-insert{
  background:radial-gradient(circle at 35% 25%,#a8d68a,#5a8a42 70%,#2f5520);
  color:#0a1a04;
  text-shadow:0 1px 1px rgba(255,255,255,.25);
  flex-direction:column;
  gap:4px;
  padding-top:8px;
}
.btn-insert .bill-slot-glyph{
  display:block;
  width:60%;height:4px;
  background:#1a0a02;
  border-radius:0 0 4px 4px;
  box-shadow:
    inset 0 1px 2px rgba(0,0,0,.95),
    inset 0 -1px 0 rgba(255,255,255,.18),
    0 1px 0 rgba(255,255,255,.25);
}
.btn-insert .btn-side-label{
  display:block;font-size:13px;line-height:1;
}
/* Brief "money going in" pulse triggered when insertBill() runs */
.btn-insert.inserting{
  animation:insertPulse .65s ease;
}
@keyframes insertPulse{
  0%   {filter:brightness(1)}
  35%  {filter:brightness(1.5) drop-shadow(0 0 12px rgba(57,255,20,.8))}
  70%  {filter:brightness(1.3) drop-shadow(0 0 8px rgba(57,255,20,.5))}
  100% {filter:brightness(1)}
}

/* Cash Out — gold, SQUARE (aspect-ratio 1, height 100% of row). */
.btn-cashout{
  background:radial-gradient(circle at 35% 25%,#ffd35c,#daa520 70%,#7a5a0a);
  color:#1a0c00;
  text-shadow:0 1px 1px rgba(255,255,255,.25);
  flex:0 0 auto;
  aspect-ratio:1;
  width:auto;
  padding:4px;
}
.btn-cashout:disabled{cursor:not-allowed;opacity:.6}

/* Paytable / Stats / Settings — slate-blue tabs, same brass trim. */
.btn-tab{
  background:radial-gradient(circle at 35% 25%,#4a6a8a,#2a4a6a 70%,#162a40);
  color:#e8f0ff;
  text-shadow:0 1px 1px rgba(0,0,0,.45);
  font-size:11px;letter-spacing:0.5px;
  text-transform:uppercase;
}

/* Free spins counter — reserves vertical space at all times so the cabinet
   doesn't reflow when free spins activate. Hidden via visibility (not display)
   so the slot stays the same height whether the bar is showing or not. */
.free-spins-bar{
  width:100%;text-align:center;padding:6px;
  background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(124,58,237,.2));
  border:1px solid rgba(168,85,247,.3);border-radius:var(--radius);
  font-size:13px;color:#c084fc;
  visibility:hidden;
}
.free-spins-bar.active{visibility:visible}

/* (Old .footer-tabs / .footer-tab styles removed — Paytable / Stats / Settings
   moved into the spin row as .btn-tab buttons styled with the cabinet brass trim.) */

/* Modal overlay */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.85);z-index:200;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.modal-overlay.hidden{display:none}
.modal-content{
  max-width:500px;width:90%;max-height:80vh;overflow-y:auto;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.modal-content h2{color:var(--accent);margin-bottom:12px;font-size:16px}
.modal-close{
  margin-top:12px;padding:8px 16px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);border-radius:var(--radius);
  cursor:pointer;font-family:inherit;width:100%;
}
.modal-close:hover{background:var(--bg-hover)}

/* Paytable */
.paytable-row{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--border);font-size:12px;
}
.paytable-icon{width:32px;height:32px;flex-shrink:0}
.paytable-name{flex:1;font-size:11px}
.paytable-pays{display:flex;gap:4px;font-size:10px;color:var(--gold)}
.paytable-pays span{min-width:36px;text-align:center}

/* Stats */
.stat-row{
  display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid var(--border);font-size:12px;
}
.stat-label{color:var(--text-muted)}
.stat-value{color:var(--gold);font-weight:bold}

/* === TREASURE HUNT BONUS === */
.treasure-hunt{text-align:center}
.treasure-hunt h2{color:var(--gold);font-size:20px;margin-bottom:16px}
.treasure-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin:16px 0;
}
.treasure-chest{
  aspect-ratio:1;background:var(--bg-card);border:2px solid #8b6914;
  border-radius:var(--radius);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;transition:all .2s;position:relative;
}
.treasure-chest:hover:not(.opened){
  transform:scale(1.05);border-color:var(--gold);
  box-shadow:0 0 12px rgba(255,215,0,.3);
}
.treasure-chest.opened{cursor:default;opacity:.8}
.treasure-chest .chest-reveal{
  font-size:12px;font-weight:bold;
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
}
.chest-reveal.prize{color:var(--gold)}
.chest-reveal.skull-reveal{color:var(--red)}
.treasure-total{
  font-size:18px;color:var(--gold);margin:12px 0;font-weight:bold;
}
.treasure-multiplier{
  font-size:14px;color:#c084fc;margin:4px 0;
}

/* === WHEEL OF FORTUNE === */
.wheel-container{
  text-align:center;position:relative;
  padding:16px;border-radius:8px;
  background:
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,
      transparent 1px,transparent 5px),
    repeating-linear-gradient(0deg,
      rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,
      transparent 1px,transparent 7px),
    linear-gradient(135deg,#3d2817,#1f140a);
  box-shadow:inset 0 0 30px rgba(0,0,0,.5);
  border:2px solid #8b6914;
}
.wheel-container h2{color:var(--gold);font-size:20px;margin-bottom:8px}
.wheel-wrap{
  position:relative;width:280px;height:280px;margin:16px auto;
}
.wheel-canvas{width:100%;height:100%}
.wheel-pointer{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:12px solid transparent;
  border-right:12px solid transparent;border-top:24px solid var(--gold);
  z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
.wheel-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,var(--gold),#8b6914);
  border:3px solid #5c3a1a;z-index:5;
}
.wheel-result{
  font-size:18px;color:var(--gold);margin:12px 0;font-weight:bold;
  min-height:28px;
}
.btn-wheel-spin{
  padding:10px 24px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--gold),#b8860b);color:#000;
  font-family:inherit;font-size:14px;font-weight:bold;
  cursor:pointer;letter-spacing:1px;
}
.btn-wheel-spin:disabled{opacity:.5;cursor:not-allowed}

/* === JACKPOT WIN === */
.jackpot-win{
  text-align:center;
}
.jackpot-win h2{font-size:28px;margin-bottom:16px}
.jackpot-win .jp-amount{
  font-size:36px;font-weight:bold;
  animation:jackpotGlow 0.5s ease infinite alternate;
}
@keyframes jackpotGlow{
  from{text-shadow:0 0 8px currentColor}
  to{text-shadow:0 0 32px currentColor,0 0 64px currentColor}
}
.jackpot-win .jp-coins{
  position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;
}
.coin-particle{
  position:absolute;width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle,var(--gold),#8b6914);
  animation:coinFall linear forwards;
}
@keyframes coinFall{
  from{transform:translateY(-20px) rotate(0);opacity:1}
  to{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Notification banner */
.notification{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:150;padding:16px 32px;border-radius:var(--radius);
  font-size:20px;font-weight:bold;text-align:center;
  animation:notifyIn 0.4s ease,notifyOut 0.4s ease 1.6s forwards;
  pointer-events:none;
}
@keyframes notifyIn{
  from{transform:translate(-50%,-50%) scale(0);opacity:0}
  to{transform:translate(-50%,-50%) scale(1);opacity:1}
}
@keyframes notifyOut{
  from{opacity:1}
  to{opacity:0}
}
.notification.free-spins-notify{
  background:linear-gradient(135deg,rgba(168,85,247,.9),rgba(124,58,237,.9));
  color:#fff;border:2px solid #c084fc;
}
.notification.bonus-notify{
  background:linear-gradient(135deg,rgba(220,38,38,.9),rgba(139,32,32,.9));
  color:#fff;border:2px solid #f87171;
}

/* Refill prompt */
.refill-prompt{
  text-align:center;padding:16px;
}
.refill-prompt h3{color:var(--gold);margin-bottom:8px}
.refill-prompt p{color:var(--text-muted);font-size:12px;margin-bottom:12px}
.btn-refill{
  padding:10px 20px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--gold),#b8860b);color:#000;
  font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;
}
.btn-refill:disabled{opacity:.5;cursor:not-allowed}

/* Settings */
.settings-section{padding:8px 0}
.settings-section h3{color:var(--accent);font-size:13px;margin-bottom:8px}
.btn-reset{
  padding:8px 16px;border:1px solid var(--red);
  background:transparent;color:var(--red);border-radius:var(--radius);
  cursor:pointer;font-family:inherit;font-size:12px;
}
.btn-reset:hover{background:rgba(255,68,68,.1)}

/* Win value flash animation (used by .win-led-value.win-flash) */
@keyframes winFlash{
  from{opacity:1;text-shadow:0 0 8px rgba(255,211,92,.5)}
  to{opacity:.6;text-shadow:0 0 20px rgba(255,211,92,.8),0 0 40px rgba(255,211,92,.3)}
}

/* Near-win reel anticipation — gold inset glow that pulses bright. The
   outer box-shadow is clipped by .reel-col's overflow:hidden, so all the
   visible "tension" comes from the inset shadow + border + a tinted
   semi-transparent overlay. */
.reel-col.anticipation .reel-strip{
  transition:transform 1.2s cubic-bezier(.17,.67,.05,1) !important;
}
.reel-col.anticipation::after{
  content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
  border:3px solid var(--gold-bright);border-radius:4px;
  background:radial-gradient(ellipse at center,
    transparent 50%,rgba(255,215,0,.08) 100%);
  animation:reelAnticipate 0.45s ease infinite alternate;
}
@keyframes reelAnticipate{
  from{
    box-shadow:inset 0 0 14px rgba(255,215,0,.45),inset 0 0 28px rgba(255,180,0,.2);
    border-color:rgba(255,215,0,.7);
  }
  to{
    box-shadow:inset 0 0 28px rgba(255,235,100,.95),inset 0 0 56px rgba(255,200,0,.5);
    border-color:rgba(255,255,180,1);
  }
}

/* === BILL INSERTER === */
/* (Old .bill-inserter / .bill-slot / .bill-anim styles removed — the standalone
   bill inserter visual moved into the Insert button on the spin row.) */

/* === LOYALTY CARD INSERT === */
.card-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;
  background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.card-overlay.hidden{display:none}
.card-reader-slot{
  width:220px;height:12px;background:#333;border-radius:6px;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 0 20px rgba(0,0,0,.5);
  margin-bottom:0;position:relative;z-index:2;
}
.loyalty-card{
  width:200px;height:120px;border-radius:10px;
  background:linear-gradient(135deg,#1a2a4a,#0d1a30);
  border:2px solid #3a4a6a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transform:translateY(300px);
  transition:transform 0.8s cubic-bezier(.17,.67,.12,1);
  position:relative;z-index:1;
}
.loyalty-card.phase-rise{
  transform:translateY(10px);
}
.loyalty-card.phase-insert{
  transition:transform 0.5s ease-in;
  transform:translateY(-60px);
}
.loyalty-card .card-logo{font-size:24px;margin-bottom:4px}
.loyalty-card .card-title{
  font-size:14px;font-weight:bold;color:var(--accent);
  letter-spacing:2px;
}
.loyalty-card .card-id{
  font-size:11px;color:var(--text-muted);letter-spacing:1px;
}
.loyalty-card .card-tier{
  font-size:10px;font-weight:bold;letter-spacing:2px;
  text-transform:uppercase;margin-top:4px;
}
.loyalty-card .card-stripe{
  position:absolute;top:28px;left:0;right:0;height:16px;
  background:linear-gradient(90deg,#2a2a3a,#3a3a5a,#2a2a3a);
}
.card-prompt{
  font-size:14px;color:var(--text-muted);margin-bottom:24px;
  animation:cardPromptPulse 1.5s ease infinite alternate;
}
@keyframes cardPromptPulse{
  from{opacity:.5}to{opacity:1}
}

/* === DEBUG PANEL === */
.debug-panel{
  width:100%;margin-top:8px;padding:8px;
  background:rgba(255,0,0,.05);border:1px dashed rgba(255,0,0,.2);
  border-radius:var(--radius);
}
.debug-title{
  font-size:10px;color:var(--red);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:6px;opacity:.6;
}
.debug-buttons{
  display:flex;flex-wrap:wrap;gap:4px;
}
.debug-btn{
  padding:4px 8px;font-size:10px;font-family:inherit;
  background:var(--bg-card);border:1px solid rgba(255,0,0,.2);
  color:var(--text-muted);border-radius:4px;cursor:pointer;
}
.debug-btn:hover{background:var(--bg-hover);color:var(--text)}

/* Responsive */
@media(max-width:420px){
  .header h1{font-size:14px}
  .jackpot-ticker .jp-value{font-size:12px}
  .controls{flex-wrap:wrap}
  .btn-spin{min-width:120px}
  .treasure-grid{grid-template-columns:repeat(3,1fr)}
  .wheel-wrap{width:240px;height:240px}
}
</style>
</head>
<body>

<div class="header">
  <h1>TINKER TIDES</h1>
</div>

<div class="cabinet-frame">
  <div class="cabinet-side cabinet-side-left">
    <div class="cabinet-pile"></div>
    <div class="cabinet-side-content" id="cabinetSlotLeft"></div>
  </div>

<div class="game-wrap">
 <!-- Wooden ship cabinet — wraps the play area (progressives, win panel,
      free spins bar, reels, SPIN button). Rivets at the four corners and
      a thick wood-grained border give the slot a "ship cabinet" feel.
      Bill inserter, footer tabs, and debug panel sit OUTSIDE the cabinet. -->
 <div class="cabinet-content">
  <!-- Progressives (relocates to right cabinet TOP on >=900px) -->
  <div class="progressives-panel" id="progressivesPanel">
    <div class="progressives-title">PROGRESSIVE</div>
    <div class="jackpot-ticker grand">
      <span class="jp-label">Grand</span>
      <span class="jp-value" id="jpGrand">10,000</span>
    </div>
    <div class="jackpot-ticker major">
      <span class="jp-label">Major</span>
      <span class="jp-value" id="jpMajor">1,000</span>
    </div>
    <div class="jackpot-ticker mini">
      <span class="jp-label">Mini</span>
      <span class="jp-value" id="jpMini">100</span>
    </div>
  </div>

  <!-- Win / Cash / Bet / Denom + Loyalty (relocates to left cabinet BOTTOM on >=900px) -->
  <div class="win-panel" id="winPanel">
    <div class="win-line-callout" id="winLineCallout"></div>
    <div class="win-led-box">
      <span class="win-led-label">Win</span>
      <span class="win-led-value" id="winLedDisplay"></span>
    </div>
    <div class="win-row">
      <div class="win-row-box win-row-cash">
        <span class="win-row-label">Cash</span>
        <span class="win-row-value" id="cashDisplay">$0.00</span>
      </div>
      <div class="win-row-box win-row-bet">
        <span class="win-row-label">Bet</span>
        <span class="win-row-value" id="betCalcDisplay">20</span>
      </div>
      <div class="win-row-box clickable denom-btn" id="denomBox" title="Tap to change denomination">
        <span class="win-row-label">Denom</span>
        <span class="win-row-value" id="denomDisplay">1&cent;</span>
        <span class="denom-change">Change</span>
      </div>
    </div>
    <div class="loyalty-card-mini" id="loyaltyBadge">
      <span class="tier-dot" id="tierDot"></span>
      <span class="tier-label" id="tierLabel">Bronze</span>
      <span class="player-id" id="playerId">PIRATE #0000</span>
    </div>
  </div>

  <!-- Free spins counter -->
  <div class="free-spins-bar" id="freeSpinsBar">
    FREE SPINS: <span id="freeSpinsCount">0</span> remaining (×<span id="freeSpinsMult">2</span>)
  </div>

  <!-- Reel area: line indicator (left) + reel frame.
       Below it: the line count label sits under the indicator, and the SPIN
       button stretches to match the reel-frame width. -->
  <div class="reel-area">
    <div class="line-indicator" id="lineIndicator">
      <div class="line-stripe-list" id="lineStripeList"></div>
    </div>
    <div class="reel-frame" id="reelFrame">
      <div class="reel-grid" id="reelGrid"></div>
      <div class="payline-overlay" id="paylineOverlay"></div>
    </div>
  </div>
  <div class="below-reels-row">
    <div class="line-indicator-label"><span id="lineCount">20</span>LINES</div>
    <div class="controls">
      <div class="controls-stack">
        <div class="controls-row">
          <button class="btn-side btn-insert" id="insertBtn" title="Insert money">
            <span class="bill-slot-glyph"></span>
            <span class="btn-side-label">INSERT $</span>
          </button>
          <button class="btn-side btn-cashout" id="cashoutBtn" title="Cash out">CASH<br>OUT</button>
        </div>
        <div class="controls-row">
          <button class="btn-side btn-tab" data-tab="paytable">Paytable</button>
          <button class="btn-side btn-tab" data-tab="stats">Stats</button>
          <button class="btn-side btn-tab" data-tab="settings">Settings</button>
        </div>
      </div>
      <button class="btn-spin" id="spinBtn">SPIN</button>
    </div>
  </div>
 </div>
</div>

  <div class="cabinet-side cabinet-side-right">
    <div class="cabinet-side-content" id="cabinetSlotRight"></div>
    <div class="cabinet-pile"></div>
  </div>
</div>

<!-- Outside the cabinet/wooden frame: debug panel only. Bill inserter and
     footer tabs (Paytable/Stats/Settings) moved INTO the spin row as buttons. -->
<div class="below-cabinet">
  <div class="debug-panel" id="debugPanel">
    <div class="debug-title">DEBUG</div>
    <div class="debug-buttons">
      <button class="debug-btn" id="dbgFreeSpins">Free Spins</button>
      <button class="debug-btn" id="dbgTreasure">Treasure Hunt</button>
      <button class="debug-btn" id="dbgWheel">Wheel</button>
      <button class="debug-btn" id="dbgJackpotMini">JP Mini</button>
      <button class="debug-btn" id="dbgJackpotMajor">JP Major</button>
      <button class="debug-btn" id="dbgJackpotGrand">JP Grand</button>
      <button class="debug-btn" id="dbgCascade">Force 3-match</button>
      <button class="debug-btn" id="dbgBigWin">Big Win (5×Captain)</button>
      <button class="debug-btn" id="dbgRollLines">Roll Lines</button>
    </div>
  </div>
</div>

<!-- Loyalty card insert overlay (hidden by default; shown on badge click) -->
<div class="card-overlay hidden" id="cardOverlay">
  <div class="card-prompt">Insert Loyalty Card</div>
  <div class="card-reader-slot"></div>
  <div class="loyalty-card" id="loyaltyCard">
    <div class="card-stripe"></div>
    <div class="card-logo">🏴‍☠️</div>
    <div class="card-title">TINKER TIDES</div>
    <div class="card-id" id="cardIdText">PIRATE #0000</div>
    <div class="card-tier" id="cardTierText" style="color:#cd7f32">BRONZE</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
